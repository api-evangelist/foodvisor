aid: foodvisor
name: Foodvisor
description: >-
  Foodvisor is a mobile nutrition platform whose Vision API uses computer
  vision and AI to identify food items from photographs and return
  nutritional information including calories, macronutrients, and serving
  estimates. The Vision API is offered to enterprise developers under a
  commercial agreement.
